<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>WebQQ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--app-height:100vh;--bg:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;--fg:#e0e0e0;--fg2:#a0a0a0;--accent:#e94560;--accent2:#533483;--border:#2a2a4a;--msg-self:#0f3460;--msg-other:#16213e}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--fg);height:var(--app-height);display:flex;flex-direction:column;overflow:hidden}
@supports (height:100dvh){:root{--app-height:100dvh}}
.login-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
.login-box{background:var(--bg2);padding:40px;border-radius:12px;text-align:center;min-width:320px}
.login-box h1{margin-bottom:20px;font-size:24px}
.login-box input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--fg);font-size:14px;outline:none}
.login-box input:focus{border-color:var(--accent)}
.login-box button{margin-top:16px;padding:10px 32px;border:none;border-radius:6px;background:var(--accent);color:#fff;font-size:14px;cursor:pointer}
.login-box button:hover{opacity:.85}
.login-box .error{color:var(--accent);margin-top:10px;font-size:13px}
.status-bar{height:32px;flex:0 0 32px;display:flex;align-items:center;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:12px;color:var(--fg2)}
.status-bar .dot{width:8px;height:8px;border-radius:50%;margin-right:8px}
.status-bar .dot.ok{background:#4caf50}
.status-bar .dot.err{background:var(--accent)}
.main{flex:1 1 auto;min-height:0;display:flex;overflow:hidden}
.sidebar{width:260px;min-height:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:12px;border-bottom:1px solid var(--border);font-size:14px;font-weight:600}
.chat-list{flex:1 1 auto;min-height:0;overflow-y:auto}
.chat-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
.chat-item:hover{background:var(--bg3)}
.chat-item.active{background:var(--bg3)}
.chat-item .name{font-size:14px;margin-bottom:2px}
.chat-item .preview{font-size:12px;color:var(--fg2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-item .time{font-size:11px;color:var(--fg2);float:right;margin-top:2px}
.messages-area{flex:1 1 auto;min-width:0;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.messages-header{padding:12px 16px;border-bottom:1px solid var(--border);font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.back-button{display:none;width:32px;height:32px;flex:0 0 32px;align-items:center;justify-content:center;border:0;border-radius:6px;background:transparent;color:var(--fg);font-size:22px;line-height:1;cursor:pointer}
.back-button:hover{background:var(--bg3)}
.chat-title-text{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.messages-scroll{flex:1 1 auto;min-height:0;overflow-y:auto;padding:12px 16px}
.msg{margin-bottom:8px;max-width:70%}
.msg.self{margin-left:auto}
.msg .sender{font-size:12px;color:var(--fg2);margin-bottom:2px}
.msg .bubble{padding:8px 12px;border-radius:8px;background:var(--msg-other);word-break:break-word;font-size:14px;line-height:1.5}
.msg.self .bubble{background:var(--msg-self)}
.msg-images{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.msg-image{display:block;max-width:240px;max-height:320px;border-radius:6px;object-fit:contain;cursor:pointer;background:var(--bg)}
.msg-image-fallback{color:var(--fg2);font-size:13px}
.msg .ts{font-size:11px;color:var(--fg2);margin-top:2px}
.at-mention{color:var(--accent);cursor:pointer;border-radius:3px;padding:0 2px}
.at-mention:hover{text-decoration:underline}
.qq-face{width:24px;height:24px;vertical-align:-6px;object-fit:contain}
.reply-card{margin-bottom:6px;padding:6px 8px;border-left:3px solid var(--accent);border-radius:4px;background:rgba(0,0,0,.14);cursor:pointer}
.reply-card:hover{background:rgba(255,255,255,.05)}
.reply-name{font-size:12px;font-weight:600;color:var(--fg)}
.reply-preview{margin-top:2px;color:var(--fg2);font-size:12px;line-height:1.35;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.reply-missing{cursor:default}
.reply-missing .reply-name{color:var(--fg2)}
.msg.flash .bubble{outline:2px solid var(--accent);outline-offset:2px}
.forward-card{margin-top:6px;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:rgba(0,0,0,.12)}
.forward-head{width:100%;display:flex;align-items:center;gap:8px;padding:8px 10px;border:0;background:transparent;color:var(--fg);font:inherit;text-align:left;cursor:pointer}
.forward-head:hover{background:rgba(255,255,255,.04)}
.forward-icon{color:var(--accent);font-size:12px;line-height:1}
.forward-title{flex:1;min-width:0;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.forward-count{color:var(--fg2);font-size:12px;white-space:nowrap}
.forward-summary{padding:0 10px 8px;color:var(--fg2);font-size:12px;line-height:1.4}
.forward-body{display:none;border-top:1px solid var(--border);padding:6px 10px}
.forward-card.open .forward-body{display:block}
.forward-node{padding:6px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.forward-node:last-child{border-bottom:0}
.forward-node-meta{display:flex;gap:8px;align-items:center;color:var(--fg2);font-size:11px;margin-bottom:2px}
.forward-node-name{color:var(--fg);font-size:12px;font-weight:600}
.forward-node-content{font-size:13px;line-height:1.45;white-space:pre-wrap}
.send-bar{flex:0 0 auto;display:flex;padding:8px 12px calc(8px + env(safe-area-inset-bottom));border-top:1px solid var(--border);background:var(--bg2);position:relative}
.send-bar input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--fg);font-size:14px;outline:none}
.send-bar input:focus{border-color:var(--accent)}
.send-bar button{margin-left:8px;padding:10px 20px;border:none;border-radius:6px;background:var(--accent);color:#fff;font-size:14px;cursor:pointer}
.send-bar button:hover{opacity:.85}
.empty-state{flex:1 1 auto;min-height:0;display:flex;align-items:center;justify-content:center;color:var(--fg2);font-size:15px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200}
.modal-box{background:var(--bg2);padding:28px 32px;border-radius:10px;max-width:400px;width:90%;text-align:center}
.modal-box p{margin-bottom:18px;font-size:14px;line-height:1.5}
.modal-box button{padding:8px 28px;border:none;border-radius:6px;background:var(--accent);color:#fff;font-size:14px;cursor:pointer}
.modal-box button:hover{opacity:.85}
.at-dropdown{position:absolute;bottom:100%;left:12px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;max-height:200px;overflow-y:auto;display:none;z-index:50;min-width:220px}
.at-dropdown.show{display:block}
.at-item{padding:6px 10px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)}
.at-item:hover{background:var(--bg3)}
.at-item .uid{color:var(--fg2);margin-left:8px;font-size:11px}
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--fg);padding:8px 18px;border-radius:6px;font-size:13px;z-index:300;animation:toastIn .2s,toastOut .3s 1.5s forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(10px)}}
@media (max-width:700px){
  .sidebar{width:100%;border-right:0}
  .empty-state{display:none}
  body:not(.chat-open) .messages-area{display:none!important}
  body.chat-open .sidebar{display:none}
  body.chat-open .messages-area{display:flex!important}
  body.chat-open .back-button{display:flex}
  .messages-header{padding:8px 10px}
  .messages-scroll{padding:10px}
  .msg{max-width:88%}
  .msg-image{max-width:min(240px,72vw)}
}
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay" style="display:none">
  <div class="login-box">
    <h1>WebQQ</h1>
    <form onsubmit="doLogin();return false">
      <input type="password" id="tokenInput" placeholder="Enter token..." autocomplete="off">
      <button type="submit">Login</button>
    </form>
    <div class="error" id="loginError"></div>
  </div>
</div>

<div class="status-bar">
  <span class="dot" id="statusDot"></span>
  <span id="statusText">Connecting...</span>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">Chats</div>
    <div class="chat-list" id="chatList"></div>
  </div>
  <div class="messages-area" id="messagesArea" style="display:none">
    <div class="messages-header">
      <button class="back-button" id="backButton" type="button" aria-label="Back to chats">‹</button>
      <div class="chat-title-text" id="chatTitle">-</div>
    </div>
    <div class="messages-scroll" id="messagesScroll"></div>
    <div class="send-bar">
      <div class="at-dropdown" id="atDropdown"></div>
      <input type="text" id="sendInput" placeholder="Type a message... (@ to mention)" autocomplete="off">
      <button onclick="doSend()">Send</button>
    </div>
  </div>
  <div class="empty-state" id="emptyState">Select a chat</div>
</div>

<script>
let currentChat = null;
let ws = null;
let authed = false;
let nicknames = {};
let atSearch = null;
let loadingOlder = false;
let noMoreMessages = false;
let lastLoadTime = 0;
let messageIndex = new Map();
let loadedMessages = [];

const $ = id => document.getElementById(id);

function updateAppHeight() {
  const viewport = window.visualViewport;
  const height = viewport ? viewport.height : window.innerHeight;
  document.documentElement.style.setProperty('--app-height', `${height}px`);
}

updateAppHeight();
window.addEventListener('resize', updateAppHeight);
window.addEventListener('orientationchange', updateAppHeight);
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', updateAppHeight);
  window.visualViewport.addEventListener('scroll', updateAppHeight);
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function showModal(msg) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal-box"><p>${esc(msg)}</p><button onclick="this.closest('.modal-overlay').remove()">OK</button></div>`;
  document.body.appendChild(overlay);
}

async function api(path, opts = {}) {
  const r = await fetch(path, opts);
  return r;
}

async function doLogin() {
  const token = $('tokenInput').value.trim();
  const r = await api('/api/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({token})
  });
  const d = await r.json();
  if (d.ok) {
    authed = true;
    $('loginOverlay').style.display = 'none';
    init();
  } else {
    $('loginError').textContent = d.error || 'Login failed';
  }
}

$('tokenInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function checkAuth() {
  const r = await api('/api/chats');
  if (r.status === 401) return false;
  return true;
}

async function loadNicknames() {
  try {
    const suffix = currentChat ? `?chat_id=${encodeURIComponent(currentChat)}` : '';
    const r = await api('/api/nicknames' + suffix);
    nicknames = await r.json();
  } catch {}
}

async function init() {
  await loadNicknames();
  updateStatus();
  loadChats();
  connectWS();
  setInterval(updateStatus, 15000);
  setInterval(loadChats, 10000);
  setInterval(loadNicknames, 60000);
}

async function updateStatus() {
  try {
    const r = await api('/api/status');
    const d = await r.json();
    $('statusDot').className = 'dot ' + (d.napcat_connected ? 'ok' : 'err');
    $('statusText').textContent = d.napcat_connected
      ? `Connected · ${d.chats_count} chats`
      : 'NapCat disconnected';
  } catch {
    $('statusDot').className = 'dot err';
    $('statusText').textContent = 'Server unreachable';
  }
}

async function loadChats() {
  try {
    const r = await api('/api/chats');
    const d = await r.json();
    renderChats(d.chats || []);
  } catch {}
}

function renderChats(chats) {
  const el = $('chatList');
  el.innerHTML = '';
  for (const c of chats) {
    const div = document.createElement('div');
    div.className = 'chat-item' + (c.chat_id === currentChat ? ' active' : '');
    const t = c.last_time ? new Date(c.last_time * 1000) : null;
    const ts = t ? t.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
    div.innerHTML = `<span class="time">${ts}</span><div class="name">${esc(c.name || c.chat_id)}</div><div class="preview">${esc(c.last_text || '')}</div>`;
    div.onclick = () => selectChat(c.chat_id, c.name);
    el.appendChild(div);
  }
}

async function selectChat(chatId, name) {
  currentChat = chatId;
  loadingOlder = false;
  noMoreMessages = false;
  await loadNicknames();
  document.body.classList.add('chat-open');
  $('emptyState').style.display = 'none';
  $('messagesArea').style.display = 'flex';
  $('chatTitle').textContent = name || chatId;
  messageIndex = new Map();
  loadedMessages = [];
  $('messagesScroll').innerHTML = '';
  await loadMessages(chatId);
  renderChats((await (await api('/api/chats')).json()).chats || []);
}

function showChatList() {
  document.body.classList.remove('chat-open');
  hideAtDropdown();
}

async function loadMessages(chatId, before = null) {
  if (before !== null) {
    if (loadingOlder || noMoreMessages) return;
    loadingOlder = true;
  }
  try {
    let url = `/api/messages?chat_id=${encodeURIComponent(chatId)}&limit=50`;
    if (before) url += `&before=${before}`;
    const r = await api(url);
    const d = await r.json();
    const msgs = d.messages || [];
    if (before !== null && msgs.length < 50) noMoreMessages = true;
    const prepend = before !== null;
    if (prepend) msgs.reverse();
    indexMessages(msgs);
    if (prepend) {
      loadedMessages = msgs.concat(loadedMessages);
    } else {
      loadedMessages = loadedMessages.concat(msgs);
    }
    const scroll = $('messagesScroll');
    const wasAtBottom = scroll.scrollHeight - scroll.scrollTop - scroll.clientHeight < 50;
    const oldHeight = scroll.scrollHeight;
    for (const m of msgs) {
      appendMessage(m, prepend);
    }
    if (before) {
      scroll.scrollTop = scroll.scrollHeight - oldHeight;
    } else if (wasAtBottom) {
      scroll.scrollTop = scroll.scrollHeight;
    }
  } finally {
    if (before !== null) {
      loadingOlder = false;
      lastLoadTime = Date.now();
    }
  }
}

function renderContent(text, mentions) {
  let html = esc(text);
  html = html.replace(/@\[(\d+)\]/g, (match, uid) => {
    const name = (mentions && mentions[uid]) || nicknames[uid] || uid;
    return `<span class="at-mention" onclick="copyUid('${uid}')" title="Click to copy UID: ${uid}">@${esc(name)}</span>`;
  });
  html = html.replace(/\[face:(\d+)\]/g, (match, id) => {
    const label = `[face:${id}]`;
    const src = `https://qzonestyle.gtimg.cn/qzone/em/e${id}.gif`;
    return `<img class="qq-face" src="${src}" alt="${label}" title="${label}" loading="lazy" referrerpolicy="no-referrer" onerror="this.replaceWith(document.createTextNode(this.alt))">`;
  });
  return html;
}

function splitReplyTokens(text) {
  const replies = [];
  const content = String(text || '').replace(/\[reply:(\d+)\]/g, (match, id) => {
    replies.push(normalizeMessageId(id));
    return '';
  }).trim();
  return {content, replies};
}

function messagePreview(m) {
  if (!m) return '';
  let text = String(m.content || '')
    .replace(/\[reply:\d+\]/g, '')
    .replace(/\[image\]/g, '')
    .replace(/\[forward\]/g, '')
    .trim();
  if (!text && Array.isArray(m.images) && m.images.length) text = '[image]';
  if (!text && Array.isArray(m.forwards) && m.forwards.length) text = '[forward]';
  return text || '[message]';
}

function indexMessages(messages) {
  if (!Array.isArray(messages)) return;
  for (const m of messages) {
    const id = normalizeMessageId(m && m.message_id);
    if (!id) continue;
    messageIndex.set(id, m);
    refreshReplyCards(id);
  }
}

function normalizeMessageId(id) {
  if (id === undefined || id === null) return '';
  return String(id).trim();
}

function appendReplies(bubble, replyIds) {
  if (!Array.isArray(replyIds) || !replyIds.length) return;
  for (const id of replyIds) {
    const card = document.createElement('div');
    card.className = 'reply-card';
    card.dataset.replyId = id;
    renderReplyCard(card);
    bubble.appendChild(card);
  }
}

function renderReplyCard(card) {
  const id = normalizeMessageId(card.dataset.replyId);
  const original = findMessageById(id);
  card.className = 'reply-card' + (original ? '' : ' reply-missing');
  card.replaceChildren();

  const name = document.createElement('div');
  name.className = 'reply-name';
  name.textContent = original ? (original.sender_name || String(original.sender_id || 'Unknown')) : 'Reply';
  const preview = document.createElement('div');
  preview.className = 'reply-preview';
  preview.innerHTML = original ? renderContent(messagePreview(original), original.mentions) : `Original message ${esc(id)} is not loaded`;
  card.append(name, preview);

  card.title = original ? 'Jump to replied message' : '';
  card.onclick = original ? () => jumpToMessage(id) : null;
}

function findMessageById(id) {
  const key = normalizeMessageId(id);
  if (!key) return null;
  const indexed = messageIndex.get(key);
  if (indexed) return indexed;
  for (const m of loadedMessages) {
    if (normalizeMessageId(m && m.message_id) === key) {
      messageIndex.set(key, m);
      return m;
    }
  }
  return null;
}

function refreshReplyCards(id) {
  for (const card of document.querySelectorAll(`.reply-card[data-reply-id="${attrSelectorValue(id)}"]`)) {
    renderReplyCard(card);
  }
}

function jumpToMessage(id) {
  const target = document.querySelector(`.msg[data-message-id="${attrSelectorValue(id)}"]`);
  if (!target) return;
  target.scrollIntoView({block: 'center', behavior: 'smooth'});
  target.classList.add('flash');
  setTimeout(() => target.classList.remove('flash'), 1200);
}

function attrSelectorValue(value) {
  return String(value).replace(/\\/g, '\\\\').replace(/"/g, '\\"');
}

function appendImages(bubble, images) {
  if (!Array.isArray(images) || !images.length) return;
  const wrap = document.createElement('div');
  wrap.className = 'msg-images';
  for (const image of images) {
    const url = image && image.url;
    const thumbnailUrl = (image && image.thumbnail) || url;
    if (!thumbnailUrl) {
      const fallback = document.createElement('div');
      fallback.className = 'msg-image-fallback';
      fallback.textContent = '[image unavailable]';
      wrap.appendChild(fallback);
      continue;
    }
    const file = image && image.file;
    const thumbProxyUrl = `/api/image?url=${encodeURIComponent(thumbnailUrl)}${file ? '&file=' + encodeURIComponent(file) : ''}`;
    const refreshedThumbProxyUrl = `${thumbProxyUrl}&refresh=1`;
    const fullProxyUrl = `/api/image/full?url=${encodeURIComponent(url || thumbnailUrl)}${file ? '&file=' + encodeURIComponent(file) : ''}`;
    const img = document.createElement('img');
    img.className = 'msg-image';
    img.src = thumbProxyUrl;
    img.alt = image.summary || image.file || 'image';
    img.loading = 'lazy';
    img.referrerPolicy = 'no-referrer';
    img.dataset.refreshed = '0';
    img.addEventListener('click', () => window.open(fullProxyUrl, '_blank', 'noopener'));
    img.addEventListener('error', () => {
      if (img.dataset.refreshed !== '1') {
        img.dataset.refreshed = '1';
        img.src = refreshedThumbProxyUrl;
        return;
      }
      const fallback = document.createElement('div');
      fallback.className = 'msg-image-fallback';
      fallback.textContent = '[image unavailable]';
      img.replaceWith(fallback);
    });
    wrap.appendChild(img);
  }
  bubble.appendChild(wrap);
}

function appendForwards(bubble, forwards) {
  if (!Array.isArray(forwards) || !forwards.length) return;
  for (const forward of forwards) {
    const nodes = Array.isArray(forward && forward.nodes) ? forward.nodes : [];
    const card = document.createElement('div');
    card.className = 'forward-card';

    const head = document.createElement('button');
    head.type = 'button';
    head.className = 'forward-head';
    head.setAttribute('aria-expanded', 'false');

    const icon = document.createElement('span');
    icon.className = 'forward-icon';
    icon.textContent = '▶';
    const title = document.createElement('span');
    title.className = 'forward-title';
    title.textContent = (forward && forward.title) || 'Forwarded messages';
    const count = document.createElement('span');
    count.className = 'forward-count';
    count.textContent = nodes.length ? `${nodes.length} messages` : ((forward && forward.status) === 'unavailable' ? 'unavailable' : 'loading failed');
    head.append(icon, title, count);
    card.appendChild(head);

    if (forward && forward.summary) {
      const summary = document.createElement('div');
      summary.className = 'forward-summary';
      summary.textContent = forward.summary;
      card.appendChild(summary);
    }

    const body = document.createElement('div');
    body.className = 'forward-body';
    if (nodes.length) {
      for (const node of nodes) {
        appendForwardNode(body, node || {});
      }
    } else {
      const empty = document.createElement('div');
      empty.className = 'forward-node-content';
      empty.textContent = (forward && forward.error) || 'Forward content is unavailable.';
      body.appendChild(empty);
    }
    card.appendChild(body);

    head.addEventListener('click', () => {
      const open = card.classList.toggle('open');
      head.setAttribute('aria-expanded', open ? 'true' : 'false');
      icon.textContent = open ? '▼' : '▶';
    });
    bubble.appendChild(card);
  }
}

function appendForwardNode(body, node) {
  const item = document.createElement('div');
  item.className = 'forward-node';

  const meta = document.createElement('div');
  meta.className = 'forward-node-meta';
  const name = document.createElement('span');
  name.className = 'forward-node-name';
  name.textContent = node.sender_name || String(node.sender_id || 'Unknown');
  meta.appendChild(name);
  if (node.time) {
    const time = document.createElement('span');
    time.textContent = new Date(node.time * 1000).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    meta.appendChild(time);
  }
  item.appendChild(meta);

  const text = (node.content || '').replace(/\[image\]/g, '').trim();
  if (text) {
    const content = document.createElement('div');
    content.className = 'forward-node-content';
    content.innerHTML = renderContent(text, node.mentions);
    item.appendChild(content);
  }
  appendImages(item, node.images);
  appendForwards(item, node.forwards);
  body.appendChild(item);
}

function copyUid(uid) {
  navigator.clipboard.writeText(uid).then(() => showToast(`Copied: ${uid}`));
}

function appendMessage(m, prepend = false) {
  const scroll = $('messagesScroll');
  const div = document.createElement('div');
  div.className = 'msg' + (m.self ? ' self' : '');
  if (m.time) div.dataset.time = String(m.time);
  const messageId = normalizeMessageId(m.message_id);
  if (messageId) {
    div.dataset.messageId = messageId;
    messageIndex.set(messageId, m);
    refreshReplyCards(messageId);
  }
  const t = m.time ? new Date(m.time * 1000) : null;
  const ts = t ? t.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'}) : '';
  let visibleText = Array.isArray(m.images) && m.images.length ? (m.content || '').replace(/\[image\]/g, '').trim() : (m.content || '');
  if (Array.isArray(m.forwards) && m.forwards.length) visibleText = visibleText.replace(/\[forward\]/g, '').trim();
  const rendered = splitReplyTokens(visibleText);
  div.innerHTML = `<div class="sender">${esc(m.sender_name || String(m.sender_id || ''))}</div><div class="bubble">${renderContent(rendered.content, m.mentions)}</div><div class="ts">${ts}</div>`;
  const bubble = div.querySelector('.bubble');
  appendReplies(bubble, rendered.replies);
  if (rendered.replies.length) {
    const replyEls = bubble.querySelectorAll('.reply-card');
    for (let i = replyEls.length - 1; i >= 0; i--) bubble.prepend(replyEls[i]);
  }
  appendImages(bubble, m.images);
  appendForwards(bubble, m.forwards);
  if (prepend) {
    scroll.prepend(div);
  } else {
    scroll.appendChild(div);
    if (scroll.scrollHeight - scroll.scrollTop - scroll.clientHeight < 150) {
      scroll.scrollTop = scroll.scrollHeight;
    }
  }
  for (const card of div.querySelectorAll('.reply-missing')) {
    renderReplyCard(card);
  }
}

async function doSend() {
  if (!currentChat) return;
  const input = $('sendInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  hideAtDropdown();
  try {
    const r = await api('/api/send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({chat_id: currentChat, text})
    });
    const d = await r.json();
    if (!d.ok) { input.value = text; showModal(d.error || 'Send failed'); }
  } catch (e) { input.value = text; showModal('Send failed: ' + e); }
}

// @ autocomplete
function showAtDropdown(query) {
  const dd = $('atDropdown');
  if (!currentChat || !currentChat.startsWith('group_')) {
    dd.classList.remove('show');
    return;
  }
  const entries = Object.entries(nicknames).filter(([uid, name]) =>
    String(name).toLowerCase().includes(query.toLowerCase()) || uid.includes(query)
  ).slice(0, 8);
  if (!entries.length) { dd.classList.remove('show'); return; }
  dd.replaceChildren();
  for (const [uid, name] of entries) {
    const item = document.createElement('div');
    item.className = 'at-item';
    item.dataset.uid = uid;
    item.dataset.name = String(name);
    item.addEventListener('mousedown', e => {
      e.preventDefault();
      insertAt(uid);
    });

    item.append(document.createTextNode(String(name)));
    const uidEl = document.createElement('span');
    uidEl.className = 'uid';
    uidEl.textContent = uid;
    item.appendChild(uidEl);
    dd.appendChild(item);
  }
  dd.classList.add('show');
}

function hideAtDropdown() {
  $('atDropdown').classList.remove('show');
  atSearch = null;
}

function insertAt(uid) {
  const input = $('sendInput');
  const val = input.value;
  const atIdx = val.lastIndexOf('@');
  if (atIdx >= 0) {
    input.value = val.substring(0, atIdx) + `@[${uid}]` + val.substring(input.selectionStart);
  }
  hideAtDropdown();
  input.focus();
}

$('sendInput').addEventListener('input', function() {
  const val = this.value;
  const cursor = this.selectionStart;
  const before = val.substring(0, cursor);
  const atMatch = before.match(/@([^@\s]*)$/);
  if (atMatch) {
    atSearch = atMatch[1];
    showAtDropdown(atSearch);
  } else {
    hideAtDropdown();
  }
});

$('sendInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    if ($('atDropdown').classList.contains('show')) {
      const first = $('atDropdown').querySelector('.at-item');
      if (first) {
        e.preventDefault();
        insertAt(first.dataset.uid);
        return;
      }
    }
    doSend();
  } else if (e.key === 'Escape') {
    hideAtDropdown();
  }
});

$('sendInput').addEventListener('blur', () => {
  setTimeout(hideAtDropdown, 200);
});

$('backButton').addEventListener('click', showChatList);

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const token = document.cookie.match(/(?:^|;\s*)token=([^;]*)/)?.[1] || '';
  ws = new WebSocket(`${proto}//${location.host}/ws${token ? '?token=' + encodeURIComponent(token) : ''}`);
  ws.onmessage = e => {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'new_message' && d.data) {
        if (d.data.chat_id === currentChat) {
          loadedMessages.push(d.data);
          indexMessages([d.data]);
          appendMessage(d.data);
        }
        loadChats();
      }
    } catch {}
  };
  ws.onclose = () => setTimeout(connectWS, 3000);
  ws.onerror = () => {};
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Scroll up to load more
$('messagesScroll').addEventListener('scroll', function() {
  if (this.scrollTop < 30 && currentChat && Date.now() - lastLoadTime > 500) {
    const first = this.querySelector('.msg');
    if (first && first.dataset.time) {
      loadMessages(currentChat, Number(first.dataset.time));
    }
  }
});

// Boot
(async () => {
  const ok = await checkAuth();
  if (ok) {
    authed = true;
    $('loginOverlay').style.display = 'none';
    init();
  } else {
    $('loginOverlay').style.display = 'flex';
  }
})();
</script>
