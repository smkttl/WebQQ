<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>WebQQ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--app-height:100vh;--bg:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;--fg:#e0e0e0;--fg2:#a0a0a0;--accent:#e94560;--accent2:#533483;--border:#2a2a4a;--msg-self:#0f3460;--msg-other:#16213e}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--fg);height:var(--app-height);display:flex;flex-direction:column;overflow:hidden}
@supports (height:100dvh){:root{--app-height:100dvh}}
.login-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
.login-box{background:var(--bg2);padding:40px;border-radius:12px;text-align:center;min-width:320px}
.login-box h1{margin-bottom:20px;font-size:24px}
.login-box input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--fg);font-size:14px;outline:none}
.login-box input:focus{border-color:var(--accent)}
.login-box button{margin-top:16px;padding:10px 32px;border:none;border-radius:6px;background:var(--accent);color:#fff;font-size:14px;cursor:pointer}
.login-box button:hover{opacity:.85}
.login-box .error{color:var(--accent);margin-top:10px;font-size:13px}
.status-bar{height:32px;flex:0 0 32px;display:flex;align-items:center;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:12px;color:var(--fg2)}
.status-bar .dot{width:8px;height:8px;border-radius:50%;margin-right:8px}
.status-bar .dot.ok{background:#4caf50}
.status-bar .dot.err{background:var(--accent)}
.status-spacer{flex:1}
.status-button{height:24px;padding:0 8px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--fg);font-size:12px;cursor:pointer}
.status-button:hover{background:var(--bg3)}
.main{flex:1 1 auto;min-height:0;display:flex;overflow:hidden}
.sidebar{width:260px;flex:0 0 260px;min-height:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:12px;border-bottom:1px solid var(--border);font-size:14px;font-weight:600}
.chat-list{flex:1 1 auto;min-height:0;overflow-y:auto}
.chat-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s;display:flex;align-items:center;gap:10px}
.chat-item:hover{background:var(--bg3)}
.chat-item.active{background:var(--bg3)}
.chat-item.loading{background:var(--bg3);opacity:.82}
.chat-avatar,.msg-avatar,.member-avatar{position:relative;flex:0 0 auto;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg3);color:var(--fg);overflow:hidden}
.chat-avatar{width:36px;height:36px;font-size:12px}
.chat-avatar img,.msg-avatar img,.member-avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.avatar-fallback{position:relative;z-index:0}
.chat-main{flex:1;min-width:0}
.chat-item .name{font-size:14px;margin-bottom:2px}
.chat-item .chat-id{font-size:11px;color:var(--fg2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.chat-item .preview{font-size:12px;color:var(--fg2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-item .time{font-size:11px;color:var(--fg2);margin-left:auto;align-self:flex-start;white-space:nowrap}
.messages-area{flex:1 1 auto;min-width:0;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.messages-header{padding:12px 16px;border-bottom:1px solid var(--border);font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.back-button{display:none;width:32px;height:32px;flex:0 0 32px;align-items:center;justify-content:center;border:0;border-radius:6px;background:transparent;color:var(--fg);font-size:22px;line-height:1;cursor:pointer}
.back-button:hover{background:var(--bg3)}
.chat-title-text{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px;overflow:hidden}
.chat-title-name{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-title-id{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--fg2);font-size:12px;font-weight:400;line-height:1.2}
.header-icon-button{display:none;width:32px;height:32px;flex:0 0 32px;align-items:center;justify-content:center;border:0;border-radius:6px;background:transparent;color:var(--fg);font-size:18px;line-height:1;cursor:pointer}
.header-icon-button:hover{background:var(--bg3)}
.messages-scroll{flex:1 1 auto;min-height:0;overflow-y:auto;padding:12px 16px}
.messages-loading{height:100%;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--fg2);font-size:13px}
.loading-spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.inline-error{height:100%;min-height:160px;display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:13px;text-align:center}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{margin-bottom:8px;max-width:70%;display:flex;align-items:flex-start;gap:8px}
.msg.self{margin-left:auto;flex-direction:row-reverse}
.msg.system{max-width:100%;justify-content:center;margin:10px auto}
.msg.system .msg-avatar,.msg.system .sender{display:none}
.msg.system .msg-body{max-width:min(520px,92%)}
.msg.system .bubble{padding:5px 10px;border:1px solid var(--border);border-radius:999px;background:rgba(0,0,0,.14);color:var(--fg2);font-size:12px;text-align:center}
.msg.system .ts{text-align:center}
.msg-avatar{width:32px;height:32px;font-size:11px;margin-top:16px}
.msg.self .msg-avatar{display:none}
.msg-body{min-width:0}
.msg .sender{font-size:12px;color:var(--fg2);margin-bottom:2px}
.msg .bubble{padding:8px 12px;border-radius:8px;background:var(--msg-other);word-break:break-word;font-size:14px;line-height:1.5}
.msg.self .bubble{background:var(--msg-self)}
.msg.recalled .bubble{outline:1px dashed var(--accent);outline-offset:2px}
.msg.failed .bubble{outline:1px dashed #ffb74d;outline-offset:2px}
.recalled-tag,.send-error-tag{display:inline-flex;align-items:center;margin-bottom:6px;padding:2px 6px;border:1px solid var(--accent);border-radius:999px;color:var(--accent);font-size:11px;line-height:1.2}
.send-error-tag{border-color:#ffb74d;color:#ffb74d}
.msg-images{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.msg-image-frame{width:240px;height:320px;max-width:100%;border-radius:6px;background:var(--bg);overflow:hidden;display:flex;align-items:center;justify-content:center;overflow-anchor:none}
.msg-image{display:block;width:100%;height:100%;object-fit:contain;cursor:pointer}
.msg-image-fallback{color:var(--fg2);font-size:13px}
.msg-media{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.media-card{max-width:320px;border:1px solid var(--border);border-radius:6px;background:rgba(0,0,0,.12);overflow:hidden}
.media-card video,.media-card audio{display:block;width:100%;max-height:260px;background:#000}
.media-fallback{padding:8px 10px;color:var(--fg2);font-size:13px}
.extra-segments{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.extra-segment{max-width:360px;padding:7px 9px;border:1px solid var(--border);border-radius:6px;background:rgba(0,0,0,.12);color:var(--fg2);font-size:12px;line-height:1.4}
.extra-segment strong{display:block;color:var(--fg);font-size:12px;margin-bottom:2px}
.msg-files{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.file-card{display:flex;align-items:center;gap:10px;max-width:320px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:rgba(0,0,0,.12)}
.file-icon{flex:0 0 auto;color:var(--accent);font-size:18px;line-height:1}
.file-main{flex:1;min-width:0}
.file-name{font-size:13px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-size{margin-top:2px;color:var(--fg2);font-size:12px}
.file-download{flex:0 0 auto;color:var(--accent);font-size:13px;text-decoration:none}
.file-download:hover{text-decoration:underline}
.msg .ts{font-size:11px;color:var(--fg2);margin-top:2px}
.at-mention{color:var(--accent);cursor:pointer;border-radius:3px;padding:0 2px}
.at-mention:hover{text-decoration:underline}
.qq-face{width:24px;height:24px;vertical-align:-6px;object-fit:contain}
.reply-card{margin-bottom:6px;padding:6px 8px;border-left:3px solid var(--accent);border-radius:4px;background:rgba(0,0,0,.14);cursor:pointer}
.reply-card:hover{background:rgba(255,255,255,.05)}
.reply-name{font-size:12px;font-weight:600;color:var(--fg)}
.reply-preview{margin-top:2px;color:var(--fg2);font-size:12px;line-height:1.35;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.reply-missing{cursor:default}
.reply-missing .reply-name{color:var(--fg2)}
.msg.flash .bubble{outline:2px solid var(--accent);outline-offset:2px}
.forward-card{margin-top:6px;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:rgba(0,0,0,.12)}
.forward-head{width:100%;display:flex;align-items:center;gap:8px;padding:8px 10px;border:0;background:transparent;color:var(--fg);font:inherit;text-align:left;cursor:pointer}
.forward-head:hover{background:rgba(255,255,255,.04)}
.forward-icon{color:var(--accent);font-size:12px;line-height:1}
.forward-title{flex:1;min-width:0;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.forward-count{color:var(--fg2);font-size:12px;white-space:nowrap}
.forward-summary{padding:0 10px 8px;color:var(--fg2);font-size:12px;line-height:1.4}
.forward-body{display:none;border-top:1px solid var(--border);padding:6px 10px}
.forward-card.open .forward-body{display:block}
.forward-node{padding:6px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.forward-node:last-child{border-bottom:0}
.forward-node-meta{display:flex;gap:8px;align-items:center;color:var(--fg2);font-size:11px;margin-bottom:2px}
.forward-node-name{color:var(--fg);font-size:12px;font-weight:600}
.forward-node-content{font-size:13px;line-height:1.45;white-space:pre-wrap}
.send-bar{flex:0 0 auto;display:flex;padding:8px 12px calc(8px + env(safe-area-inset-bottom));border-top:1px solid var(--border);background:var(--bg2);position:relative}
.send-bar .attach-button{flex:0 0 40px;width:40px;height:40px;margin:0 8px 0 0;padding:0;display:flex;align-items:center;justify-content:center;border:none;border-radius:6px;background:var(--bg3);color:#fff;font-size:18px;line-height:1;cursor:pointer}
.send-bar .attach-button:hover{opacity:.85}
.portal-select{flex:0 0 auto;max-width:150px;margin:0 8px 0 0;padding:0 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--fg);font-size:13px;outline:none}
.portal-select:focus{border-color:var(--accent)}
.send-bar input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--fg);font-size:14px;outline:none}
.send-bar input:focus{border-color:var(--accent)}
.send-bar button{margin-left:8px;padding:10px 20px;border:none;border-radius:6px;background:var(--accent);color:#fff;font-size:14px;cursor:pointer}
.send-bar button:hover{opacity:.85}
.send-bar .file-input{display:none}
.reply-draft{position:absolute;left:12px;right:12px;bottom:100%;display:none;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-bottom:0;border-radius:6px 6px 0 0;background:var(--bg2);font-size:12px}
.reply-draft.show{display:flex}
.reply-draft-text{flex:1;min-width:0;color:var(--fg2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.reply-draft-name{color:var(--fg);font-weight:600}
.reply-draft button{width:24px;height:24px;margin:0;padding:0;border:0;border-radius:4px;background:transparent;color:var(--fg2);font-size:18px;line-height:1;cursor:pointer}
.reply-draft button:hover{background:var(--bg3);color:var(--fg)}
.msg-menu{position:fixed;display:none;min-width:120px;padding:4px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);box-shadow:0 8px 24px rgba(0,0,0,.35);z-index:500}
.msg-menu.show{display:block}
.msg-menu button{display:block;width:100%;padding:8px 10px;border:0;border-radius:4px;background:transparent;color:var(--fg);font-size:13px;text-align:left;cursor:pointer}
.msg-menu button:hover{background:var(--bg3)}
.reaction-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.reaction-chip{display:flex;align-items:center;gap:4px;max-width:180px;padding:2px 6px;border:1px solid var(--border);border-radius:999px;background:rgba(0,0,0,.12);color:var(--fg2);font-size:12px;line-height:1;cursor:pointer}
.reaction-chip:hover{background:rgba(255,255,255,.08)}
.reaction-chip img{width:18px;height:18px;object-fit:contain}
.reaction-chip .face-text{font-size:14px;line-height:1}
.reaction-chip .reaction-name{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.reaction-chip .reaction-count{flex:0 0 auto}
.reaction-users{margin:0 0 18px;text-align:left;display:grid;gap:8px}
.reaction-user{display:flex;justify-content:space-between;gap:12px;font-size:13px;line-height:1.35}
.reaction-user .uid{color:var(--fg2);font-size:12px}
.empty-state{flex:1 1 auto;min-height:0;display:flex;align-items:center;justify-content:center;color:var(--fg2);font-size:15px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200}
.modal-box{background:var(--bg2);padding:28px 32px;border-radius:10px;max-width:400px;width:90%;text-align:center}
.modal-box p{margin-bottom:18px;font-size:14px;line-height:1.5}
.modal-box button{padding:8px 28px;border:none;border-radius:6px;background:var(--accent);color:#fff;font-size:14px;cursor:pointer}
.modal-box button:hover{opacity:.85}
.plugin-modal{max-width:760px;text-align:left;padding:18px}
.plugin-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.plugin-head h2{flex:1;font-size:16px;font-weight:600}
.plugin-toolbar{display:flex;gap:8px;margin-bottom:12px}
.plugin-toolbar button,.plugin-row button,.plugin-config-actions button{padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg3);color:var(--fg);font-size:12px;cursor:pointer}
.plugin-layout{display:grid;grid-template-columns:260px 1fr;gap:12px;min-height:360px}
.plugin-list{border:1px solid var(--border);border-radius:6px;overflow-y:auto;max-height:60vh}
.plugin-row{display:block;width:100%;padding:10px;border:0;border-bottom:1px solid var(--border);background:transparent;color:var(--fg);text-align:left;cursor:pointer}
.plugin-row:last-child{border-bottom:0}
.plugin-row.active,.plugin-row:hover{background:var(--bg3)}
.plugin-row-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600}
.plugin-pill{margin-left:auto;padding:1px 6px;border-radius:999px;border:1px solid var(--border);color:var(--fg2);font-size:11px;font-weight:400}
.plugin-row-desc{margin-top:4px;color:var(--fg2);font-size:12px;line-height:1.35}
.plugin-detail{min-width:0}
.plugin-status{margin-bottom:8px;color:var(--fg2);font-size:12px;line-height:1.4;white-space:pre-wrap}
.plugin-error{color:var(--accent)}
.plugin-config{width:100%;min-height:260px;padding:10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--fg);font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:13px;line-height:1.45;resize:vertical;outline:none}
.plugin-config:focus{border-color:var(--accent)}
.plugin-config-actions{display:flex;gap:8px;margin-top:8px}
@media (max-width:700px){.plugin-layout{grid-template-columns:1fr}.plugin-list{max-height:180px}}
.member-modal{max-width:420px;text-align:left;padding:20px}
.member-modal-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.member-modal-head h2{flex:1;min-width:0;font-size:16px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.member-modal-close{width:28px;height:28px;padding:0!important;border-radius:4px!important;background:transparent!important;color:var(--fg2)!important;font-size:20px!important;line-height:1!important}
.member-search{width:100%;padding:9px 12px;margin-bottom:10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--fg);font-size:14px;outline:none}
.member-search:focus{border-color:var(--accent)}
.member-list{max-height:min(420px,60vh);overflow-y:auto;border:1px solid var(--border);border-radius:6px}
.member-modal .member-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;border:0;border-bottom:1px solid var(--border);border-radius:0;background:transparent;color:var(--fg);font-size:13px;text-align:left;cursor:pointer}
.member-item:last-child{border-bottom:0}
.member-modal .member-item:hover{background:var(--bg3)}
.member-avatar{width:30px;height:30px;font-size:12px}
.member-main{min-width:0}
.member-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.member-fields{margin-top:2px;color:var(--fg2);font-size:11px;line-height:1.35}
.member-field{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.member-empty{padding:14px;color:var(--fg2);font-size:13px;text-align:center}
.member-loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px;color:var(--fg2);font-size:13px}
.member-error{padding:16px;color:var(--accent);font-size:13px;text-align:center}
.at-dropdown{position:absolute;bottom:100%;left:12px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;max-height:200px;overflow-y:auto;display:none;z-index:50;min-width:220px}
.at-dropdown.show{display:block}
.at-item{padding:6px 10px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)}
.at-item:hover{background:var(--bg3)}
.at-item .uid{color:var(--fg2);margin-left:8px;font-size:11px}
.emoji-dropdown{position:absolute;bottom:100%;left:12px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;max-height:240px;overflow-y:auto;display:none;z-index:501;min-width:240px;max-width:min(360px,calc(100vw - 24px));padding:4px;box-shadow:0 8px 24px rgba(0,0,0,.35)}
.emoji-dropdown.fixed{position:fixed;bottom:auto;left:0}
.emoji-dropdown.show{display:block}
.emoji-search{width:100%;padding:7px 9px;margin-bottom:4px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--fg);font-size:13px;outline:none}
.emoji-search:focus{border-color:var(--accent)}
.emoji-list{display:grid;gap:0}
.emoji-empty{padding:10px;color:var(--fg2);font-size:13px;text-align:center}
.emoji-item{display:flex;align-items:center;gap:8px;width:100%;padding:6px 8px;border:0;border-radius:4px;background:transparent;color:var(--fg);font-size:13px;text-align:left;cursor:pointer}
.emoji-item:hover{background:var(--bg3)}
.emoji-item .qq-face{flex:0 0 auto}
.emoji-item .face-text{flex:0 0 24px;text-align:center;font-size:18px;color:var(--fg)}
.emoji-item-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.emoji-item-id{color:var(--fg2);font-size:11px}
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--fg);padding:8px 18px;border-radius:6px;font-size:13px;z-index:300;animation:toastIn .2s,toastOut .3s 1.5s forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(10px)}}
@media (max-width:700px){
  .sidebar{width:100%;flex:0 0 100%;border-right:0}
  .empty-state{display:none}
  body:not(.chat-open) .messages-area{display:none!important}
  body.chat-open .sidebar{display:none}
  body.chat-open .messages-area{display:flex!important}
  body.chat-open .back-button{display:flex}
  .messages-header{padding:8px 10px}
  .messages-scroll{padding:10px}
  .msg{max-width:88%}
  .msg-image-frame{width:min(240px,72vw)}
}
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay" style="display:none">
  <div class="login-box">
    <h1>WebQQ</h1>
    <form onsubmit="doLogin();return false">
      <input type="password" id="tokenInput" placeholder="Enter token..." autocomplete="off">
      <button type="submit">Login</button>
    </form>
    <div class="error" id="loginError"></div>
  </div>
</div>

<div class="status-bar">
  <span class="dot" id="statusDot"></span>
  <span id="statusText">Connecting...</span>

async function loadPlugins() {

    if (selectedPluginId) await loadPluginConfig(selectedPluginId);
    else renderPluginDetail(null);
  } catch (e) {
    showToast('Failed to load plugins');
  }
}

function portalPlugins() {
  return plugins.filter(p => p && p.enabled && p.loaded && p.portal_receiver);

function renderPortalOptions() {
  const select = $('portalSelect');

  const receivers = portalPlugins();

    selectedPortalPluginId = '';

  select.replaceChildren();
  const normal = document.createElement('option');
  normal.value = '';
  normal.textContent = 'Normal';
  select.appendChild(normal);
  for (const plugin of receivers) {

    option.value = plugin.id;
    option.textContent = plugin.name || plugin.id;

async function loadPluginConfig(pluginId) {
  const plugin = plugins.find(p => p.id === pluginId);
  try {
    const r = await api(`/api/plugins/${encodeURIComponent(pluginId)}/config`);
    const d = await r.json();
    pluginConfigText = d.text || '{}';
    renderPluginDetail(plugin, d.error || '');
  } catch {
    pluginConfigText = '{}';
    renderPluginDetail(plugin, 'Failed to load config');
  }
}

function renderPluginDetail(plugin, configError = '') {
  const status = $('pluginStatus');
  const config = $('pluginConfig');
  const toggle = $('pluginToggle');
  const restart = $('pluginRestart');
  const save = $('pluginSave');
  if (!status || !config || !toggle) return;
  const disabled = !plugin;
  config.disabled = disabled;
  toggle.disabled = disabled;
  restart.disabled = disabled;
  save.disabled = disabled;
  if (!plugin) {
    status.textContent = 'Select a plugin';
    config.value = '';
    return;
  }
  const lines = [
    `${plugin.name || plugin.id} ${plugin.version || ''}`.trim(),
    plugin.enabled ? (plugin.loaded ? 'Enabled and loaded' : 'Enabled but not loaded') : 'Disabled',
  ];
  if (plugin.error) lines.push(`Error: ${plugin.error}`);
  if (plugin.config_error || configError) lines.push(`Config: ${plugin.config_error || configError}`);
  status.textContent = lines.join('\n');
  status.className = 'plugin-status' + ((plugin.error || plugin.config_error || configError) ? ' plugin-error' : '');
  config.value = pluginConfigText;
  toggle.textContent = plugin.enabled ? 'Disable' : 'Enable';
}

async function saveSelectedPluginConfig() {

function pad2(n) {
  return String(n).padStart(2, '0');
}

function formatDateYMD(date) {
  return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
}

function sameLocalDate(a, b) {
  return a.getFullYear() === b.getFullYear()
    && a.getMonth() === b.getMonth()
    && a.getDate() === b.getDate();
}

function formatClock(date, withSeconds = false) {
  const parts = [pad2(date.getHours()), pad2(date.getMinutes())];
  if (withSeconds) parts.push(pad2(date.getSeconds()));
  return parts.join(':');
}

function formatMessageTimestamp(date) {
  const now = new Date();
  const clock = formatClock(date, true);
  if (sameLocalDate(date, now)) return clock;
  if (date.getFullYear() === now.getFullYear()) return `${pad2(date.getMonth() + 1)}-${pad2(date.getDate())} ${clock}`;
  return `${formatDateYMD(date)} ${clock}`;
}

function formatCompactTimestamp(date) {
  const now = new Date();
  if (sameLocalDate(date, now)) return formatClock(date);
  if (date.getFullYear() === now.getFullYear()) return `${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
  return formatDateYMD(date);
}

    const t = c.last_time ? new Date(c.last_time * 1000) : null;
    const ts = t ? formatCompactTimestamp(t) : '';
    const nameText = c.name || c.chat_id;
    div.appendChild(createAvatar('chat-avatar', c.avatar_url || avatarUrlForChat(c.chat_id), nameText));
    const main = document.createElement('div');
    main.className = 'chat-main';
    const name = document.createElement('div');
    name.className = 'name';
    name.textContent = nameText;
    const id = document.createElement('div');
    id.className = 'chat-id';
    id.textContent = c.chat_id;
    const preview = document.createElement('div');
    preview.className = 'preview';
    preview.textContent = c.last_text || '';
    const time = document.createElement('span');
    time.className = 'time';
    time.textContent = ts;
    main.append(name, id, preview);
    div.append(main, time);
    div.onclick = () => selectChat(c.chat_id, c.name);
    el.appendChild(div);
  }
}

async function selectChat(chatId, name) {
  const token = ++chatLoadToken;
  currentChat = chatId;
  loadingChatId = chatId;
  loadingOlder = false;
  noMoreMessages = false;
  document.body.classList.add('chat-open');
  $('emptyState').style.display = 'none';
  $('messagesArea').style.display = 'flex';
  $('chatTitle').textContent = name || chatId;
  $('chatIdText').textContent = chatId;
  updateHeaderActions();
  messageIndex = new Map();
  loadedMessages = [];
  messageReactions = new Map();
  clearReplyDraft();
  hideMessageMenu();
  showMessagesLoading();
  loadChats();
  markCurrentChatRead(chatId);
  try {
    await loadNicknames();
    if (token !== chatLoadToken || currentChat !== chatId) return;
    await loadMessages(chatId);
    if (token !== chatLoadToken || currentChat !== chatId) return;
    const chats = (await (await api('/api/chats')).json()).chats || [];
    if (token !== chatLoadToken || currentChat !== chatId) return;
    loadingChatId = null;
    renderChats(chats);
  } catch (e) {
    if (token !== chatLoadToken || currentChat !== chatId) return;
    loadingChatId = null;
    showMessagesError('Failed to load messages');
    loadChats();
  }
}

function markCurrentChatRead(chatId) {
  if (!chatId || chatId.startsWith('temp_')) return;
  api('/api/mark-read', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({chat_id: chatId})
  }).catch(() => {});
}

function showChatList() {
  document.body.classList.remove('chat-open');
  hideAtDropdown();
  hideMessageMenu();
}

function currentGroupId() {
  return currentChat && currentChat.startsWith('group_') ? currentChat.slice(6) : '';
}

function avatarUrl(type, id) {
  id = normalizeMessageId(id);
  if (!id || !/^\d+$/.test(id) || !['user', 'group'].includes(type)) return '';
  const token = document.cookie.match(/(?:^|;\s*)token=([^;]*)/)?.[1] || '';
  const auth = token ? `&token=${encodeURIComponent(token)}` : '';
  return `/api/avatar?type=${encodeURIComponent(type)}&id=${encodeURIComponent(id)}${auth}`;
}

function avatarUrlForChat(chatId) {
  chatId = normalizeMessageId(chatId);
  if (chatId.startsWith('group_')) return avatarUrl('group', chatId.slice(6));
  if (chatId.startsWith('private_')) return avatarUrl('user', chatId.slice(8));
  if (chatId.startsWith('temp_')) {
    const parts = chatId.split('_');
    return avatarUrl('user', parts[2]);
  }
  return '';
}

function initials(label) {
  return String(label || '?').trim().slice(0, 2) || '?';
}

function createAvatar(className, src, label) {
  const avatar = document.createElement('div');
  avatar.className = className;
  const fallback = document.createElement('span');
  fallback.className = 'avatar-fallback';
  fallback.textContent = initials(label);
  avatar.appendChild(fallback);
  if (src) {
    const img = document.createElement('img');
    img.alt = '';
    img.loading = 'lazy';
    img.referrerPolicy = 'no-referrer';
    img.src = src;
    img.addEventListener('load', () => { fallback.style.display = 'none'; });
    img.addEventListener('error', () => { img.remove(); fallback.style.display = ''; });
    avatar.appendChild(img);
  }
  return avatar;
}

async function loadMessages(chatId, before = null) {
  if (before !== null) {
    if (loadingOlder || noMoreMessages) return;
    loadingOlder = true;
  }
  try {
    let url = `/api/messages?chat_id=${encodeURIComponent(chatId)}&limit=50`;
    if (before) url += `&before=${before}`;
    const r = await api(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    const msgs = d.messages || [];
    if (before !== null && msgs.length < 50) noMoreMessages = true;
    const prepend = before !== null;
    if (prepend) msgs.reverse();
    indexMessages(msgs);
    if (prepend) {
      loadedMessages = msgs.concat(loadedMessages);
    } else {
      loadedMessages = loadedMessages.concat(msgs);
    }
    const scroll = $('messagesScroll');
    const wasAtBottom = scroll.scrollHeight - scroll.scrollTop - scroll.clientHeight < 50;
    const oldHeight = scroll.scrollHeight;
    if (!prepend) scroll.replaceChildren();
    for (const m of msgs) {
      appendMessage(m, prepend);
    }
    if (before) {
      scroll.scrollTop = scroll.scrollHeight - oldHeight;
    } else if (wasAtBottom) {
      scroll.scrollTop = scroll.scrollHeight;
    }
  } finally {
    if (before !== null) {
      loadingOlder = false;
      lastLoadTime = Date.now();
    }
  }
}

function renderContent(text, mentions) {
  let html = esc(text);
  html = html.replace(/@\[(\d+)\]/g, (match, uid) => {
    const name = (mentions && mentions[uid]) || nicknames[uid] || uid;
    return `<span class="at-mention" onclick="copyUid('${uid}')" title="Click to copy UID: ${uid}">@${esc(name)}</span>`;
  });
  html = html.replace(/\[face:(\d+)\]/g, (match, id) => {
    return faceHtml(id);
  });
  return html;
}

function faceInfo(id) {
  return (faceManifest.faces && faceManifest.faces[String(id)]) || null;
}

function faceLabel(id) {
  const info = faceInfo(id);
  return info && info.name ? `${info.name} [face:${id}]` : `[face:${id}]`;
}

function faceName(id) {
  const info = faceInfo(id);
  return info && info.name ? info.name : String(id);
}

function faceText(id) {
  const info = faceInfo(id);
  return info && info.name ? `[face:${id} ${info.name}]` : `[face:${id}]`;
}

function faceAssetUrl(info, kind) {
  return info && info[kind] ? `/faces/${info[kind]}` : '';
}

function faceHtml(id) {
  const wrap = document.createElement('span');
  wrap.appendChild(createFaceNode(id));
  return wrap.innerHTML;
}

function createFaceNode(id, className = 'qq-face') {
  const info = faceInfo(id);
  const label = faceLabel(id);
  const gif = faceAssetUrl(info, 'gif');
  const png = faceAssetUrl(info, 'png');
  if (gif || png) {
    const img = document.createElement('img');
    img.className = className;
    img.src = gif || png;
    img.alt = faceText(id);
    img.title = label;
    img.referrerPolicy = 'no-referrer';
    img.dataset.fallback = '0';
    img.addEventListener('error', () => {
      if (img.dataset.fallback === '0' && gif && png) {
        img.dataset.fallback = '1';
        img.src = png;
        return;
      }
      img.replaceWith(document.createTextNode(img.alt));
    });
    return img;
  }
  const span = document.createElement('span');
  span.className = 'face-text';
  span.title = label;
  span.textContent = info && info.type === 2 && info.unicode ? info.unicode : (info && info.name ? info.name : String(id));
  return span;
}

function reactionFaceIds() {
  return Array.isArray(faceManifest.reaction_ids) && faceManifest.reaction_ids.length
    ? faceManifest.reaction_ids
    : fallbackReactionFaceIds;
}

function namedFaceEntries() {
  return Object.entries(faceManifest.faces || {})
    .filter(([, info]) => info && info.name)
    .sort((a, b) => Number(a[0]) - Number(b[0]));
}

function faceSearchText(id, info) {
  const name = String(info.name || '').toLowerCase();
  const initials = (faceInitialsByName[info.name] || name).toLowerCase();
  return {id: String(id), name, initials};
}

function matchingNamedFaces(query, options = {}) {
  const q = String(query || '').trim().toLowerCase();
  const limit = options.limit === undefined ? 12 : options.limit;
  const entries = options.entries || namedFaceEntries();
  const matches = entries.filter(([id, info]) => {
    if (!q) return true;
    const search = faceSearchText(id, info);
    return search.id.includes(q) || search.name.includes(q) || search.initials.includes(q);
  });
  return limit ? matches.slice(0, limit) : matches;
}

function reactionFaceEntries() {
  const faces = faceManifest.faces || {};
  return reactionFaceIds()
    .map(id => [String(id), faces[String(id)] || {name: String(id)}])
    .filter(([, info]) => info);
}

function splitReplyTokens(text) {
  const replies = [];
  const content = String(text || '').replace(/\[reply:(\d+)\]/g, (match, id) => {
    replies.push(normalizeMessageId(id));
    return '';
  }).trim();
  return {content, replies};
}

function messagePreview(m) {
  if (!m) return '';
  let text = String(m.content || '')
    .replace(/\[reply:\d+\]/g, '')
    .replace(/\[image\]/g, '')
    .replace(/\[forward\]/g, '')
    .replace(/\[file\]/g, '')
    .replace(/\[video\]/g, '')
    .replace(/\[voice\]/g, '')
    .replace(/\[onlinefile\]/g, '')
    .replace(/\[flashtransfer\]/g, '')
    .trim();
  if (!text && Array.isArray(m.images) && m.images.length) text = '[image]';
  if (!text && Array.isArray(m.videos) && m.videos.length) text = '[video]';
  if (!text && Array.isArray(m.records) && m.records.length) text = '[voice]';
  if (!text && Array.isArray(m.forwards) && m.forwards.length) text = '[forward]';
  if (!text && Array.isArray(m.files) && m.files.length) text = '[file]';
  if (!text && Array.isArray(m.extra_segments) && m.extra_segments.length) text = m.extra_segments[0].label || '[message]';
  return text || '[message]';
}

function copyMessageText(m) {
  if (!m) return '';
  return String(m.content || '').trim() || messagePreview(m);
}

function indexMessages(messages) {
  if (!Array.isArray(messages)) return;
  for (const m of messages) {
    const id = normalizeMessageId(m && m.message_id);
    if (id) {
      messageIndex.set(id, m);
      setStoredMessageReactions(id, m.reactions || []);
      refreshReplyCards(id);
    }
  }
}

function normalizeMessageId(id) {
  if (id === undefined || id === null) return '';
  return String(id).trim();
}

function appendReplies(bubble, replyIds) {
  if (!Array.isArray(replyIds) || !replyIds.length) return;
  for (const id of replyIds) {
    const card = document.createElement('div');
    card.className = 'reply-card';
    card.dataset.replyId = id;
    renderReplyCard(card);
    bubble.appendChild(card);
  }
}

function renderReplyCard(card) {
  const id = normalizeMessageId(card.dataset.replyId);
  const original = findMessageById(id);
  card.className = 'reply-card' + (original ? '' : ' reply-missing');
  card.replaceChildren();

  const name = document.createElement('div');
  name.className = 'reply-name';
  name.textContent = original ? (original.sender_name || String(original.sender_id || 'Unknown')) : 'Reply';
  const preview = document.createElement('div');
  preview.className = 'reply-preview';
  preview.innerHTML = original ? renderContent(messagePreview(original), original.mentions) : `Original message ${esc(id)} is not loaded`;
  card.append(name, preview);

  card.title = original ? 'Jump to replied message' : '';
  card.onclick = original ? () => jumpToMessage(id) : null;
}

function findMessageById(id) {
  const key = normalizeMessageId(id);
  if (!key) return null;
  const indexed = messageIndex.get(key);
  if (indexed) return indexed;
  for (const m of loadedMessages) {
    if (normalizeMessageId(m && m.message_id) === key) {
      messageIndex.set(key, m);
      return m;
    }
  }
  return null;
}

function refreshReplyCards(id) {
  for (const card of document.querySelectorAll(`.reply-card[data-reply-id="${attrSelectorValue(id)}"]`)) {
    renderReplyCard(card);
  }
}

function jumpToMessage(id) {
  const target = document.querySelector(`.msg[data-message-id="${attrSelectorValue(id)}"]`);
  if (!target) return;
  target.scrollIntoView({block: 'center', behavior: 'smooth'});
  target.classList.add('flash');
  setTimeout(() => target.classList.remove('flash'), 1200);
}

function attrSelectorValue(value) {
  return String(value).replace(/\\/g, '\\\\').replace(/"/g, '\\"');
}

function appendReactionChips(msgEl, reactions = []) {
  const container = msgEl.querySelector(':scope > .msg-body') || msgEl;
  const old = container.querySelector(':scope > .reaction-chips');
  if (old) old.remove();
  const visible = Array.isArray(reactions) ? reactions.filter(r => Number(r && r.count) > 0) : [];
  if (!visible.length) return;
  const wrap = document.createElement('div');
  wrap.className = 'reaction-chips';
  for (const reaction of visible) {
    const emojiId = String(reaction.emoji_id);
    const chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'reaction-chip';
    chip.title = faceLabel(emojiId);
    const face = createFaceNode(emojiId);
    const name = document.createElement('span');
    name.className = 'reaction-name';
    name.textContent = faceName(emojiId);
    const count = document.createElement('span');
    count.className = 'reaction-count';
    count.textContent = reaction.count;
    chip.addEventListener('click', e => {
      e.stopPropagation();
      showReactionUsers(reaction);
    });
    chip.append(face, name, count);
    wrap.appendChild(chip);
  }
  container.appendChild(wrap);
}

function setStoredMessageReactions(messageId, reactions) {
  const key = normalizeMessageId(messageId);
  if (!key) return [];
  const list = Array.isArray(reactions) ? reactions : [];
  messageReactions.set(key, list);
  const msg = findMessageById(key);
  if (msg) msg.reactions = list;
  return list;
}

function mergeStoredMessageReactions(messageId, reactions) {
  const key = normalizeMessageId(messageId);
  if (!key) return [];
  const merged = new Map((messageReactions.get(key) || []).map(r => [String(r.emoji_id), r]));
  for (const reaction of Array.isArray(reactions) ? reactions : []) {
    if (!reaction || reaction.emoji_id === undefined || reaction.emoji_id === null) continue;
    const emojiId = String(reaction.emoji_id);
    if (Number(reaction.count) > 0) merged.set(emojiId, reaction);
    else merged.delete(emojiId);
  }
  return setStoredMessageReactions(key, Array.from(merged.values()));
}

function applyEmojiLikeEvent(data) {
  if (!data || (data.chat_id && currentChat && data.chat_id !== currentChat)) return;
  const key = normalizeMessageId(data.message_id);
  if (!key) return;
  const reactions = mergeStoredMessageReactions(key, data.reactions || []);
  const target = document.querySelector(`.msg[data-message-id="${attrSelectorValue(key)}"]`);
  if (target) appendReactionChips(target, reactions);
}

function findMessageElement(data) {
  const messageId = normalizeMessageId(data && data.message_id);
  if (messageId) {
    const byId = document.querySelector(`.msg[data-message-id="${attrSelectorValue(messageId)}"]`);
    if (byId) return byId;
  }
  const localId = normalizeMessageId(data && data.local_id);
  if (localId) {
    return document.querySelector(`.msg[data-local-id="${attrSelectorValue(localId)}"]`);
  }
  return null;
}

function upsertLoadedMessage(message, localId = '') {
  if (!message) return;
  const messageId = normalizeMessageId(message.message_id);
  const normalizedLocalId = normalizeMessageId(localId || message.local_id);
  let index = -1;
  if (messageId) {
    index = loadedMessages.findIndex(m => normalizeMessageId(m && m.message_id) === messageId);
  }
  if (index < 0 && normalizedLocalId) {
    index = loadedMessages.findIndex(m => normalizeMessageId(m && m.local_id) === normalizedLocalId);
  }
  if (index >= 0) loadedMessages[index] = message;
  else loadedMessages.push(message);
  if (messageId) {
    messageIndex.set(messageId, message);
    refreshReplyCards(messageId);
  }
}

function applyMessageUpdate(data) {
  if (!data || (data.chat_id && currentChat && data.chat_id !== currentChat)) return;
  const message = data.message;
  if (!message) return;
  upsertLoadedMessage(message, data.local_id);
  const target = findMessageElement({message_id: message.message_id, local_id: data.local_id || message.local_id});
  if (target) {
    renderMessageElement(target, message);
  } else if (message.chat_id === currentChat) {
    appendMessage(message);
  }
  loadChats();
}

function isNearBottom(scroll, threshold = 80) {
  return scroll.scrollHeight - scroll.scrollTop - scroll.clientHeight < threshold;
}

function preserveBottomIfNeeded(wasNearBottom) {
  if (!wasNearBottom) return;
  const schedule = window.requestAnimationFrame || (fn => setTimeout(fn, 0));
  schedule(() => {
    const scroll = $('messagesScroll');
    scroll.scrollTop = scroll.scrollHeight;
  });
}

function imageDimensionKey(image) {
  return String((image && (image.file || image.url || image.thumbnail)) || '');
}

function imageDisplaySize(image) {
  const key = imageDimensionKey(image);
  const stored = key ? imageDimensions.get(key) : null;
  const rawWidth = Number((image && image.width) || (stored && stored.width));
  const rawHeight = Number((image && image.height) || (stored && stored.height));
  const maxWidth = Math.min(240, Math.floor(window.innerWidth * 0.72));
  const maxHeight = 320;
  if (rawWidth > 0 && rawHeight > 0) {
    const scale = Math.min(maxWidth / rawWidth, maxHeight / rawHeight, 1);
    return {
      width: Math.max(1, Math.round(rawWidth * scale)),
      height: Math.max(1, Math.round(rawHeight * scale)),
    };
  }
  return {width: maxWidth, height: maxHeight};
}

function applyImageFrameSize(frame, image) {
  const size = imageDisplaySize(image);
  frame.style.width = `${size.width}px`;
  frame.style.height = `${size.height}px`;
}

function rememberImageDimensions(image, img, frame) {
  const key = imageDimensionKey(image);
  if (!key || !img.naturalWidth || !img.naturalHeight) return;
  imageDimensions.set(key, {width: img.naturalWidth, height: img.naturalHeight});
  if (!image.width || !image.height) {
    image.width = img.naturalWidth;
    image.height = img.naturalHeight;
    applyImageFrameSize(frame, image);
  }
}

function appendImages(bubble, images) {
  if (!Array.isArray(images) || !images.length) return;
  const wrap = document.createElement('div');
  wrap.className = 'msg-images';
  for (const image of images) {
    const url = image && image.url;
    const thumbnailUrl = (image && image.thumbnail) || url;
    if (!thumbnailUrl) {
      const fallback = document.createElement('div');
      fallback.className = 'msg-image-fallback';
      fallback.textContent = '[image unavailable]';
      wrap.appendChild(fallback);
      continue;
    }
    const file = image && image.file;
    const thumbProxyUrl = `/api/image?url=${encodeURIComponent(thumbnailUrl)}${file ? '&file=' + encodeURIComponent(file) : ''}`;
    const refreshedThumbProxyUrl = `${thumbProxyUrl}&refresh=1`;
    const fullProxyUrl = `/api/image/full?url=${encodeURIComponent(url || thumbnailUrl)}${file ? '&file=' + encodeURIComponent(file) : ''}`;
    const frame = document.createElement('div');
    frame.className = 'msg-image-frame';
    applyImageFrameSize(frame, image);
    const img = document.createElement('img');
    img.className = 'msg-image';
    img.alt = image.summary || image.file || 'image';
    img.loading = 'lazy';
    img.referrerPolicy = 'no-referrer';
    img.dataset.refreshed = '0';
    const wasNearBottom = isNearBottom($('messagesScroll'));
    img.addEventListener('load', () => {
      rememberImageDimensions(image, img, frame);
      preserveBottomIfNeeded(wasNearBottom);
    });
    img.addEventListener('click', () => window.open(fullProxyUrl, '_blank', 'noopener'));
    img.addEventListener('error', () => {
      if (img.dataset.refreshed !== '1') {
        img.dataset.refreshed = '1';
        img.src = refreshedThumbProxyUrl;
        return;
      }
      const fallback = document.createElement('div');
      fallback.className = 'msg-image-fallback';
      fallback.textContent = '[image unavailable]';
      frame.replaceWith(fallback);
      preserveBottomIfNeeded(wasNearBottom);
    });
    frame.appendChild(img);
    img.src = thumbProxyUrl;
    wrap.appendChild(frame);
  }
  bubble.appendChild(wrap);
}

function humanFileSize(size) {
  const n = Number(size);
  if (!Number.isFinite(n) || n <= 0) return '';
  const units = ['B', 'KB', 'MB', 'GB'];
  let value = n;
  let unit = 0;
  while (value >= 1024 && unit < units.length - 1) {
    value /= 1024;
    unit++;
  }
  const digits = unit === 0 || value >= 10 ? 0 : 1;
  return `${value.toFixed(digits)} ${units[unit]}`;
}

function fileDownloadUrl(file) {
  const params = new URLSearchParams();
  if (currentChat) params.set('chat_id', currentChat);
  const token = document.cookie.match(/(?:^|;\s*)token=([^;]*)/)?.[1] || '';
  if (token) params.set('token', token);
  if (file && file.file_id && !file.id) params.set('id', String(file.file_id));
  if (file && file.fileName && !file.name) params.set('name', String(file.fileName));
  if (file && file.msgId && !file.id) params.set('id', String(file.msgId));
  if (file && file.fileSize && !file.size) params.set('size', String(file.fileSize));
  for (const [key, value] of Object.entries(file || {})) {
    if (['id', 'name', 'url', 'file', 'busid'].includes(key) && value !== undefined && value !== null && value !== '') {
      params.set(key, String(value));
    }
  }
  return `/api/file?${params.toString()}`;
}

function appendFiles(bubble, files) {
  if (!Array.isArray(files) || !files.length) return;
  const wrap = document.createElement('div');
  wrap.className = 'msg-files';
  for (const file of files) {
    const card = document.createElement('div');
    card.className = 'file-card';
    const icon = document.createElement('div');
    icon.className = 'file-icon';
    icon.textContent = '📄';
    const main = document.createElement('div');
    main.className = 'file-main';
    const name = document.createElement('div');
    name.className = 'file-name';
    const kind = file && file.kind ? `${file.kind}: ` : '';
    name.textContent = kind + ((file && (file.name || file.fileName || file.file)) || 'file');
    const size = document.createElement('div');
    size.className = 'file-size';
    size.textContent = humanFileSize(file && (file.size || file.fileSize));
    main.append(name);
    if (size.textContent) main.append(size);
    card.append(icon, main);
    if (file && (file.url || file.file || file.id || file.file_id || file.msgId)) {
      const link = document.createElement('a');
      link.className = 'file-download';
      link.href = fileDownloadUrl(file);
      link.target = '_blank';
      link.rel = 'noopener';
      link.textContent = 'Download';
      card.appendChild(link);
    }
    wrap.appendChild(card);
  }
  bubble.appendChild(wrap);
}

function mediaProxyUrl(media) {
  if (!media) return '';
  if (media.url) return media.url;
  if (media.file || media.name || media.file_id) return fileDownloadUrl(media);
  return '';
}

function appendVideos(bubble, videos) {
  if (!Array.isArray(videos) || !videos.length) return;
  const wrap = document.createElement('div');
  wrap.className = 'msg-media';
  for (const video of videos) {
    const card = document.createElement('div');
    card.className = 'media-card';
    const url = mediaProxyUrl(video);
    if (url) {
      const player = document.createElement('video');
      player.controls = true;
      player.preload = 'metadata';
      player.src = url;
      card.appendChild(player);
    } else {
      const fallback = document.createElement('div');
      fallback.className = 'media-fallback';
      fallback.textContent = '[video unavailable]';
      card.appendChild(fallback);
    }
    wrap.appendChild(card);
  }
  bubble.appendChild(wrap);
}

function appendRecords(bubble, records) {
  if (!Array.isArray(records) || !records.length) return;
  const wrap = document.createElement('div');
  wrap.className = 'msg-media';
  for (const record of records) {
    const card = document.createElement('div');
    card.className = 'media-card';
    const url = mediaProxyUrl(record);
    if (url) {
      const player = document.createElement('audio');
      player.controls = true;
      player.preload = 'metadata';
      player.src = url;
      card.appendChild(player);
    } else {
      const fallback = document.createElement('div');
      fallback.className = 'media-fallback';
      fallback.textContent = '[voice unavailable]';
      card.appendChild(fallback);
    }
    wrap.appendChild(card);
  }
  bubble.appendChild(wrap);
}

function appendExtraSegments(bubble, segments) {
  if (!Array.isArray(segments) || !segments.length) return;
  const wrap = document.createElement('div');
  wrap.className = 'extra-segments';
  for (const segment of segments) {
    const item = document.createElement('div');
    item.className = 'extra-segment';
    const label = document.createElement('strong');
    label.textContent = (segment && segment.label) || `[${(segment && segment.type) || 'segment'}]`;
    item.appendChild(label);
    if (segment && segment.text) {
      const text = document.createElement('span');
      text.textContent = segment.text;
      item.appendChild(text);
    }
    wrap.appendChild(item);
  }
  bubble.appendChild(wrap);
}

function appendRecalledTag(bubble, message) {
  if (!message || !message.recalled) return;
  const tag = document.createElement('span');
  tag.className = 'recalled-tag';
  tag.textContent = 'Recalled';
  bubble.prepend(tag);
}

function appendSendErrorTag(bubble, message) {
  if (!message || !message.send_error) return;
  const tag = document.createElement('span');
  tag.className = 'send-error-tag';
  tag.title = String(message.send_error);
  tag.textContent = 'Send failed';
  bubble.prepend(tag);
}

function appendForwards(bubble, forwards) {
  if (!Array.isArray(forwards) || !forwards.length) return;
  for (const forward of forwards) {
    const nodes = Array.isArray(forward && forward.nodes) ? forward.nodes : [];
    const card = document.createElement('div');
    card.className = 'forward-card';

    const head = document.createElement('button');
    head.type = 'button';
    head.className = 'forward-head';
    head.setAttribute('aria-expanded', 'false');

    const icon = document.createElement('span');
    icon.className = 'forward-icon';
    icon.textContent = '▶';
    const title = document.createElement('span');
    title.className = 'forward-title';
    title.textContent = (forward && forward.title) || 'Forwarded messages';
    const count = document.createElement('span');
    count.className = 'forward-count';
    count.textContent = nodes.length ? `${nodes.length} messages` : ((forward && forward.status) === 'unavailable' ? 'unavailable' : 'loading failed');
    head.append(icon, title, count);
    card.appendChild(head);

    if (forward && forward.summary) {
      const summary = document.createElement('div');
      summary.className = 'forward-summary';
      summary.textContent = forward.summary;
      card.appendChild(summary);
    }

    const body = document.createElement('div');
    body.className = 'forward-body';
    if (nodes.length) {
      for (const node of nodes) {
        appendForwardNode(body, node || {});
      }
    } else {
      const empty = document.createElement('div');
      empty.className = 'forward-node-content';
      empty.textContent = (forward && forward.error) || 'Forward content is unavailable.';
      body.appendChild(empty);
    }
    card.appendChild(body);

    head.addEventListener('click', () => {
      const open = card.classList.toggle('open');
      head.setAttribute('aria-expanded', open ? 'true' : 'false');
      icon.textContent = open ? '▼' : '▶';
    });
    bubble.appendChild(card);
  }
}

function appendForwardNode(body, node) {
  const item = document.createElement('div');
  item.className = 'forward-node';

  const meta = document.createElement('div');
  meta.className = 'forward-node-meta';
  const name = document.createElement('span');
  name.className = 'forward-node-name';
  name.textContent = node.sender_name || String(node.sender_id || 'Unknown');
  meta.appendChild(name);
  if (node.time) {
    const time = document.createElement('span');
    time.textContent = formatCompactTimestamp(new Date(node.time * 1000));
    meta.appendChild(time);
  }
  item.appendChild(meta);

  const text = (node.content || '').replace(/\[image\]/g, '').replace(/\[file\]/g, '').trim();
  if (text) {
    const content = document.createElement('div');
    content.className = 'forward-node-content';
    content.innerHTML = renderContent(text, node.mentions);
    item.appendChild(content);
  }
  appendImages(item, node.images);
  appendFiles(item, node.files);
  appendForwards(item, node.forwards);
  body.appendChild(item);
}

function copyUid(uid) {
  navigator.clipboard.writeText(uid).then(() => showToast(`Copied: ${uid}`));
}

function bindMessageMenu(el, message) {
  el.addEventListener('contextmenu', e => {
    e.preventDefault();
    showMessageMenu(message, e.clientX, e.clientY);
  });
  el.addEventListener('pointerdown', e => {
    if (e.pointerType === 'mouse' || e.button !== 0) return;
    longPressStart = {x: e.clientX, y: e.clientY};
    clearTimeout(longPressTimer);
    longPressTimer = setTimeout(() => {
      showMessageMenu(message, e.clientX, e.clientY);
      longPressTimer = null;
    }, 550);
  });
  el.addEventListener('pointermove', e => {
    if (!longPressStart) return;
    if (Math.abs(e.clientX - longPressStart.x) > 10 || Math.abs(e.clientY - longPressStart.y) > 10) {
      cancelLongPress();
    }
  });
  el.addEventListener('pointerup', cancelLongPress);
  el.addEventListener('pointercancel', cancelLongPress);
  el.addEventListener('pointerleave', cancelLongPress);
}

function cancelLongPress() {
  clearTimeout(longPressTimer);
  longPressTimer = null;
  longPressStart = null;
}

function showMessageMenu(message, x, y) {
  selectedMenuMessage = message;
  const menu = $('msgMenu');
  $('msgMenuTempChat').style.display = canStartTempChat(message) ? 'block' : 'none';
  $('msgMenuRevoke').style.display = canRevokeMessage(message) ? 'block' : 'none';
  menu.classList.add('show');
  menu.style.left = '0px';
  menu.style.top = '0px';
  const rect = menu.getBoundingClientRect();
  const left = Math.max(8, Math.min(x, window.innerWidth - rect.width - 8));
  const top = Math.max(8, Math.min(y, window.innerHeight - rect.height - 8));
  menu.style.left = `${left}px`;
  menu.style.top = `${top}px`;
}

function canRevokeMessage(message) {
  const id = normalizeMessageId(message && message.message_id);
  if (!(message && message.self && !message.recalled && /^\d+$/.test(id))) return false;
  const time = Number(message.time || 0);
  return time > 0 && ((Date.now() / 1000) - time) <= revokeWindowSeconds;
}

function canStartTempChat(message) {
  if (!message || message.self) return false;
  return message.type === 'group'
    && groupIdForMessage(message)
    && normalizeMessageId(message.sender_id);
}

function groupIdForMessage(message) {
  const direct = normalizeMessageId(message && message.group_id);
  if (direct) return direct;
  const chatId = normalizeMessageId((message && message.chat_id) || currentChat);
  return chatId.startsWith('group_') ? chatId.slice(6) : '';
}

function hideMessageMenu() {
  $('msgMenu').classList.remove('show');
  selectedMenuMessage = null;
  hideEmojiDropdown();
  cancelLongPress();
}

function showFaceReplyPicker() {
  const message = selectedMenuMessage;
  const id = normalizeMessageId(message && message.message_id);
  if (!id) {
    hideMessageMenu();
    showToast('Cannot react: message id unavailable');
    return;
  }
  const menu = $('msgMenu');
  faceReplyMessageId = id;
  const rect = menu.getBoundingClientRect();
  showEmojiDropdown('', {
    mode: 'faceReply',
    fixed: true,
    position: {x: rect.right + 6, y: rect.top},
  });
}

async function sendFaceReply(messageId, emojiId) {
  messageId = normalizeMessageId(messageId);
  hideEmojiDropdown();
  hideMessageMenu();
  if (!messageId) {
    showToast('Cannot react: message id unavailable');
    return;
  }
  try {
    const r = await api('/api/message/emoji-like', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message_id: messageId, emoji_id: emojiId, chat_id: currentChat || ''})
    });
    const d = await r.json();
    if (!d.ok) {
      showModal(d.error || 'Reaction failed');
      return;
    }
    applyEmojiLikeEvent({
      message_id: d.message_id || messageId,
      chat_id: d.chat_id || currentChat || '',
      reactions: d.reactions || [{emoji_id: String(emojiId), count: 1, users: [{user_id: 'self', name: 'You'}]}]
    });
    showToast('Reaction sent');
  } catch (e) {
    showModal('Reaction failed: ' + e);
  }
}

async function copySelectedMessage() {
  const text = copyMessageText(selectedMenuMessage);
  hideMessageMenu();
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    showToast('Copied');
  } catch {
    showModal(text);

}

function replyToSelectedMessage() {
  const message = selectedMenuMessage;
  hideMessageMenu();
  const id = normalizeMessageId(message && message.message_id);
  if (!id) {
    showToast('Cannot reply: message id unavailable');
    return;
  }
  pendingReply = {id, message};
  updateReplyDraft();
  prependReplyMention(message);

}

async function revokeSelectedMessage() {
  const message = selectedMenuMessage;
  const id = normalizeMessageId(message && message.message_id);
  if (!canRevokeMessage(message)) {
    hideMessageMenu();
    showToast('Cannot revoke this message');
    return;
  }
  hideMessageMenu();
  try {
    const r = await api('/api/message/revoke', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message_id: id, chat_id: message.chat_id || currentChat || ''})
    });
    const d = await readJsonResponse(r);
    if (!r.ok || !d.ok) throw new Error(d.error || `HTTP ${r.status}`);
    if (d.message) {
      applyMessageUpdate({
        chat_id: d.chat_id || message.chat_id || currentChat || '',
        message_id: id,
        message: d.message,
        patch: d.patch || {recalled: true}
      });
    }
  } catch (e) {
    showModal(e.message || 'Revoke failed');
  }
}

async function startTempChatFromSelectedMessage() {
  const message = selectedMenuMessage;
  hideMessageMenu();
  if (!canStartTempChat(message)) return;
  const groupId = groupIdForMessage(message);
  const userId = normalizeMessageId(message.sender_id);
  const senderName = message.sender_name || userId;
  const groupName = message.chat_name || $('chatTitle').textContent || '';
  const name = groupName ? `${groupName} / ${senderName}` : `群临时会话: ${senderName}`;
  try {
    const r = await api('/api/temp-chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({group_id: groupId, user_id: userId, name, group_name: groupName})
    });
    const raw = await r.text();
    let d;
    try {
      d = JSON.parse(raw);
    } catch {
      showModal(`Temp chat failed: HTTP ${r.status} ${raw || r.statusText}`);
      return;
    }
    if (!d.ok) {
      showModal(d.error || 'Temp chat failed');
      return;
    }
    await loadChats();
    await selectChat(d.chat_id, d.name || name);
    $('sendInput').focus();
  } catch (e) {
    showModal('Temp chat failed: ' + e);
  }
}

async function showMemberList() {
  const groupId = currentGroupId();
  if (!groupId) return;
  const chatId = currentChat;
  let closed = false;
  let members = [];

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  const box = document.createElement('div');
  box.className = 'modal-box member-modal';
  const head = document.createElement('div');
  head.className = 'member-modal-head';
  const title = document.createElement('h2');
  title.textContent = 'Group members';
  const close = document.createElement('button');
  close.type = 'button';
  close.className = 'member-modal-close';
  close.setAttribute('aria-label', 'Close');
  close.textContent = '×';
  close.addEventListener('click', () => {
    closed = true;
    overlay.remove();
  });
  head.append(title, close);

  const search = document.createElement('input');
  search.className = 'member-search';
  search.type = 'search';
  search.placeholder = 'Search members';
  search.disabled = true;
  const list = document.createElement('div');
  list.className = 'member-list';

  function renderMemberLoading() {
    list.replaceChildren();
    const row = document.createElement('div');
    row.className = 'member-loading';
    const spinner = document.createElement('div');
    spinner.className = 'loading-spinner';
    const text = document.createElement('span');
    text.textContent = 'Loading members...';
    row.append(spinner, text);
    list.appendChild(row);
  }

  function renderMemberError(text) {
    list.replaceChildren();
    const row = document.createElement('div');
    row.className = 'member-error';
    row.textContent = text;
    list.appendChild(row);
  }

  function renderMemberList() {
    const query = search.value.trim().toLowerCase();
    const visible = members.filter(m => !query || m.searchText.includes(query)).slice(0, 300);
    list.replaceChildren();
    if (!visible.length) {
      const empty = document.createElement('div');
      empty.className = 'member-empty';
      empty.textContent = members.length ? 'No matching members' : 'No members loaded';
      list.appendChild(empty);
      return;
    }
    for (const member of visible) {
      const item = document.createElement('button');
      item.type = 'button';
      item.className = 'member-item';
      const avatar = createAvatar('member-avatar', avatarUrl('user', member.uid), member.displayName);
      const main = document.createElement('div');
      main.className = 'member-main';
      const name = document.createElement('div');
      name.className = 'member-name';
      name.textContent = member.displayName;
      const fields = document.createElement('div');
      fields.className = 'member-fields';
      for (const line of member.lines) {
        const field = document.createElement('span');
        field.className = 'member-field';
        field.textContent = line;
        fields.appendChild(field);
      }
      main.append(name);
      if (member.lines.length) main.append(fields);
      item.append(avatar, main);
      item.addEventListener('click', async () => {
        overlay.remove();
        await startTempChatFromMember(member.uid, member.displayName);
      });
      list.appendChild(item);
    }
  }

  search.addEventListener('input', renderMemberList);
  overlay.addEventListener('click', e => {
    if (e.target === overlay) {
      closed = true;
      overlay.remove();
    }
  });
  box.append(head, search, list);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  renderMemberLoading();
  try {
    await loadNicknames();
    const r = await api(`/api/group-members?chat_id=${encodeURIComponent(chatId)}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    if (closed) return;
    members = normalizeGroupMembers(d.members || [])
      .sort((a, b) => a.displayName.localeCompare(b.displayName, undefined, {numeric: true}) || a.uid.localeCompare(b.uid));
    search.disabled = false;
    renderMemberList();
    search.focus();
  } catch (e) {
    if (closed) return;
    renderMemberError('Failed to load members');
  }
}

function normalizeGroupMembers(rawMembers) {
  if (!Array.isArray(rawMembers) || !rawMembers.length) {
    return Object.entries(nicknames || {}).map(([uid, name]) => normalizeGroupMember({user_id: uid, display_name: name}));
  }
  return rawMembers.map(normalizeGroupMember).filter(m => m.uid);
}

function normalizeGroupMember(raw) {
  const uid = normalizeMessageId(raw.user_id || raw.uid);
  const values = {
    remark: String(raw.remark || '').trim(),
    name: String(raw.name || '').trim(),
    nick: String(raw.nick || raw.nickname || '').trim(),
    qid: String(raw.qid || '').trim(),
  };
  const displayName = String(raw.display_name || raw.card || values.remark || values.name || values.nick || uid).trim();
  const lines = [`uid: ${uid}`];
  for (const key of ['remark', 'name', 'nick', 'qid']) {
    if (values[key]) lines.push(`${key}: ${values[key]}`);
  }
  const searchText = [uid, displayName, ...Object.values(values)].join(' ').toLowerCase();
  return {uid, displayName, lines, searchText};
}

function prependReplyMention(message) {
  const uid = normalizeMessageId(message && message.sender_id);
  if (!uid || uid === 'self') return;
  const mention = `@[${uid}] `;
  const input = $('sendInput');
  const value = input.value;
  if (value.startsWith(mention)) return;
  input.value = mention + value;
}

function updateReplyDraft() {
  const draft = $('replyDraft');
  if (!pendingReply) {
    draft.classList.remove('show');
    $('replyDraftText').textContent = '';
    return;
  }
  const name = pendingReply.message.sender_name || String(pendingReply.message.sender_id || 'Unknown');
  $('replyDraftText').innerHTML = `<span class="reply-draft-name">${esc(name)}</span>: ${renderContent(messagePreview(pendingReply.message), pendingReply.message.mentions)}`;
  draft.classList.add('show');
}

function clearReplyDraft() {
  pendingReply = null;
  updateReplyDraft();
}

function renderMessageElement(div, m) {
  div.replaceChildren();
  div.className = 'msg' + (m.self ? ' self' : '') + (m.system ? ' system' : '');
  if (m.recalled) div.className += ' recalled';
  if (m.send_error) div.className += ' failed';
  if (m.time) div.dataset.time = String(m.time);
  if (m.local_id) div.dataset.localId = normalizeMessageId(m.local_id);
  const messageId = normalizeMessageId(m.message_id);
  if (messageId) {
    div.dataset.messageId = messageId;
    messageIndex.set(messageId, m);
    setStoredMessageReactions(messageId, m.reactions || []);
    refreshReplyCards(messageId);
  } else {
    delete div.dataset.messageId;
  }
  const t = m.time ? new Date(m.time * 1000) : null;
  const ts = t ? formatMessageTimestamp(t) : '';
  let visibleText = Array.isArray(m.images) && m.images.length ? (m.content || '').replace(/\[image\]/g, '').trim() : (m.content || '');
  if (Array.isArray(m.forwards) && m.forwards.length) visibleText = visibleText.replace(/\[forward\]/g, '').trim();
  if (Array.isArray(m.files) && m.files.length) visibleText = visibleText.replace(/\[file\]/g, '').trim();
  if (Array.isArray(m.videos) && m.videos.length) visibleText = visibleText.replace(/\[video\]/g, '').trim();
  if (Array.isArray(m.records) && m.records.length) visibleText = visibleText.replace(/\[voice\]/g, '').trim();
  const rendered = splitReplyTokens(visibleText);
  const senderLabel = m.sender_name || String(m.sender_id || '');
  div.appendChild(createAvatar('msg-avatar', m.sender_avatar_url || avatarUrl('user', m.sender_id), senderLabel));
  const body = document.createElement('div');
  body.className = 'msg-body';
  const sender = document.createElement('div');
  sender.className = 'sender';
  sender.textContent = senderLabel;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = renderContent(rendered.content, m.mentions);
  const time = document.createElement('div');
  time.className = 'ts';
  time.textContent = ts;
  body.append(sender, bubble, time);
  div.appendChild(body);
  appendRecalledTag(bubble, m);
  appendSendErrorTag(bubble, m);
  appendReplies(bubble, rendered.replies);
  if (rendered.replies.length) {
    const replyEls = bubble.querySelectorAll('.reply-card');
    for (let i = replyEls.length - 1; i >= 0; i--) bubble.prepend(replyEls[i]);
  }
  appendImages(bubble, m.images);
  appendVideos(bubble, m.videos);
  appendRecords(bubble, m.records);
  appendFiles(bubble, m.files);
  appendForwards(bubble, m.forwards);
  appendExtraSegments(bubble, m.extra_segments);
  if (messageId) appendReactionChips(div, messageReactions.get(messageId) || []);
  bindMessageMenu(div, m);
  for (const card of div.querySelectorAll('.reply-missing')) {
    renderReplyCard(card);
  }
}

function appendMessage(m, prepend = false) {
  const scroll = $('messagesScroll');
  const div = document.createElement('div');
  renderMessageElement(div, m);
  if (prepend) {
    scroll.prepend(div);
  } else {
    scroll.appendChild(div);
    if (scroll.scrollHeight - scroll.scrollTop - scroll.clientHeight < 150) {
      scroll.scrollTop = scroll.scrollHeight;
    }
  }
}

async function doSend() {
  if (!currentChat) return;
  const input = $('sendInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  hideAtDropdown();
  hideEmojiDropdown();
  const replyTo = pendingReply && pendingReply.id;
  const portalPluginId = selectedPortalPluginId;
  try {
    const path = portalPluginId
      ? `/api/plugins/${encodeURIComponent(portalPluginId)}/portal-message`
      : '/api/send';
    const r = await api(path, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({chat_id: currentChat, text, reply_to: replyTo || undefined})
    });
    const d = await r.json();
    if (!d.ok) { input.value = text; showModal(d.error || 'Send failed'); }
    else if (replyTo) { clearReplyDraft(); }
  } catch (e) { input.value = text; showModal('Send failed: ' + e); }
}

async function doSendFile(file) {
  if (!currentChat || !file) return;
  if (currentChat.startsWith('temp_')) {
    showModal('File sending is not supported for temporary chats.');
    return;
  }
  if (file.size > 100 * 1024 * 1024) {
    showModal('File is larger than 100 MB.');
    return;
  }
  const form = new FormData();
  form.append('chat_id', currentChat);
  form.append('file', file);
  try {
    const r = await api('/api/send-file', {method: 'POST', body: form});
    const d = await readJsonResponse(r);
    if (!d.ok) showModal(d.error || 'File send failed');
  } catch (e) {
    showModal('File send failed: ' + e);
  }
}

function activeSlashToken(input) {
  const cursor = input.selectionStart;
  if (cursor !== input.selectionEnd) return null;
  const before = input.value.substring(0, cursor);
  const match = before.match(/(?:^|\s)\/([A-Za-z0-9\u4e00-\u9fff]*)$/);
  if (!match) return null;
  const slashIdx = cursor - match[1].length - 1;
  return {start: slashIdx, end: cursor, query: match[1]};
}

function showEmojiDropdown(queryOrToken, options = {}) {
  const dd = $('emojiDropdown');
  const query = typeof queryOrToken === 'string' ? queryOrToken : (queryOrToken && queryOrToken.query) || '';
  dd.replaceChildren();
  const list = document.createElement('div');
  list.className = 'emoji-list';
  if (options.mode === 'faceReply') {
    const search = document.createElement('input');
    search.className = 'emoji-search';
    search.type = 'search';
    search.placeholder = 'Search faces';
    search.value = query;
    search.addEventListener('input', () => renderEmojiItems(list, search.value, options));
    search.addEventListener('mousedown', e => e.stopPropagation());
    dd.append(search, list);
    renderEmojiItems(list, query, options);
  } else {
    renderEmojiItems(list, query, options);
    if (!list.children.length) {
      dd.classList.remove('show');
      return;
    }
    dd.appendChild(list);
  }
  dd.classList.toggle('fixed', !!options.fixed);
  if (options.fixed && options.position) {
    dd.style.left = '0px';
    dd.style.top = '0px';
  } else {
    dd.style.left = '';
    dd.style.top = '';
  }
  dd.classList.add('show');
  if (options.fixed && options.position) {
    const rect = dd.getBoundingClientRect();
    const left = Math.max(8, Math.min(options.position.x, window.innerWidth - rect.width - 8));
    const top = Math.max(8, Math.min(options.position.y, window.innerHeight - rect.height - 8));
    dd.style.left = `${left}px`;
    dd.style.top = `${top}px`;
    const search = dd.querySelector('.emoji-search');
    if (search) search.focus();
  }
}

function renderEmojiItems(container, query, options = {}) {
  const entries = options.mode === 'faceReply'
    ? matchingNamedFaces(query, {entries: reactionFaceEntries(), limit: 0})
    : matchingNamedFaces(query);
  container.replaceChildren();
  if (!entries.length && options.mode === 'faceReply') {
    const empty = document.createElement('div');
    empty.className = 'emoji-empty';
    empty.textContent = 'No matching faces';
    container.appendChild(empty);
    return;
  }
  for (const [faceId, info] of entries) {
    const item = document.createElement('button');
    item.type = 'button';
    item.className = 'emoji-item';
    item.dataset.faceId = faceId;
    item.title = faceLabel(faceId);
    item.addEventListener('mousedown', e => {
      e.preventDefault();
      if (options.mode === 'faceReply') {
        sendFaceReply(faceReplyMessageId, faceId);
      } else {
        insertFaceToken(faceId);
      }
    });

    item.appendChild(createFaceNode(faceId));
    const name = document.createElement('span');
    name.className = 'emoji-item-name';
    name.textContent = info.name;
    const id = document.createElement('span');
    id.className = 'emoji-item-id';
    id.textContent = `[face:${faceId}]`;
    item.append(name, id);
    container.appendChild(item);
  }
}

function hideEmojiDropdown() {
  const dd = $('emojiDropdown');
  dd.classList.remove('show', 'fixed');
  dd.style.left = '';
  dd.style.top = '';
  slashSearch = null;
  faceReplyMessageId = null;
}

function updateEmojiDropdown() {
  const input = $('sendInput');
  const token = activeSlashToken(input);
  if (!token) {
    hideEmojiDropdown();
    return;
  }
  slashSearch = token;
  showEmojiDropdown(token);
}

function insertFaceToken(faceId) {
  const input = $('sendInput');
  const token = activeSlashToken(input) || slashSearch;
  if (!token) return;
  const val = input.value;
  const insert = `[face:${faceId}]`;
  input.value = val.substring(0, token.start) + insert + val.substring(token.end);
  const pos = token.start + insert.length;
  hideEmojiDropdown();
  input.focus();
  input.setSelectionRange(pos, pos);
}

function insertAt(uid) {
  const input = $('sendInput');
  const val = input.value;
  const atIdx = val.lastIndexOf('@');
  if (atIdx >= 0) {
    input.value = val.substring(0, atIdx) + `@[${uid}]` + val.substring(input.selectionStart);
  }
  hideAtDropdown();
  input.focus();
}

$('sendInput').addEventListener('input', function() {
  const val = this.value;
  const cursor = this.selectionStart;
  const before = val.substring(0, cursor);
  const atMatch = before.match(/@([^@\s]*)$/);
  if (atMatch) {
    atSearch = atMatch[1];
    showAtDropdown(atSearch);
  } else {
    hideAtDropdown();
  }
  updateEmojiDropdown();
});

$('sendInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    if ($('atDropdown').classList.contains('show')) {
      const first = $('atDropdown').querySelector('.at-item');
      if (first) {
        e.preventDefault();
        insertAt(first.dataset.uid);
        return;
      }
    }
    doSend();
  } else if (e.key === 'Escape') {
    hideAtDropdown();
    hideEmojiDropdown();
  }
});

$('sendInput').addEventListener('click', updateEmojiDropdown);
$('sendInput').addEventListener('keyup', e => {
  if (['ArrowLeft','ArrowRight','Home','End'].includes(e.key)) updateEmojiDropdown();
});

$('msgMenuCopy').addEventListener('click', copySelectedMessage);
$('msgMenuReply').addEventListener('click', replyToSelectedMessage);
$('msgMenuRevoke').addEventListener('click', revokeSelectedMessage);
$('msgMenuTempChat').addEventListener('click', startTempChatFromSelectedMessage);
$('msgMenuFaceReply').addEventListener('click', showFaceReplyPicker);
$('replyDraftCancel').addEventListener('click', clearReplyDraft);
$('memberListButton').addEventListener('click', showMemberList);
$('portalSelect').addEventListener('change', e => {
  selectedPortalPluginId = e.target.value;
});
document.addEventListener('pointerdown', e => {
  if (!$('msgMenu').contains(e.target) && !$('emojiDropdown').contains(e.target)) hideMessageMenu();
});
document.addEventListener('wheel', () => {
  userScrollActive = true;
}, {passive: true});
document.addEventListener('touchmove', () => {
  userScrollActive = true;
}, {passive: true});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    hideMessageMenu();
    clearReplyDraft();
    hideEmojiDropdown();
  } else if (['ArrowUp','ArrowDown','PageUp','PageDown','Home','End',' '].includes(e.key)) {
    userScrollActive = true;
  }
});

$('sendInput').addEventListener('blur', () => {
  setTimeout(hideAtDropdown, 200);
  setTimeout(hideEmojiDropdown, 200);
});

$('attachButton').addEventListener('click', () => {
  if (!currentChat) return;
  if (currentChat.startsWith('temp_')) {
    showModal('File sending is not supported for temporary chats.');
    return;
  }
  $('fileInput').click();
});

$('fileInput').addEventListener('change', e => {
  const file = e.target.files && e.target.files[0];
  e.target.value = '';
  if (file) doSendFile(file);
});

$('backButton').addEventListener('click', showChatList);
$('pluginsButton').addEventListener('click', showPluginsPanel);

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const token = document.cookie.match(/(?:^|;\s*)token=([^;]*)/)?.[1] || '';
  ws = new WebSocket(`${proto}//${location.host}/ws${token ? '?token=' + encodeURIComponent(token) : ''}`);
  ws.onmessage = e => {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'new_message' && d.data) {
        if (d.data.chat_id === currentChat) {
          loadedMessages.push(d.data);
          indexMessages([d.data]);
          appendMessage(d.data);
        }
        loadChats();
      } else if (d.type === 'emoji_like' && d.data) {
        applyEmojiLikeEvent(d.data);
      } else if (d.type === 'message_update' && d.data) {
        applyMessageUpdate(d.data);
      }
    } catch {}
  };
  ws.onclose = () => setTimeout(connectWS, 3000);
  ws.onerror = () => {};
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Scroll up to load more
$('messagesScroll').addEventListener('scroll', function() {
  if (userScrollActive) hideMessageMenu();
  userScrollActive = false;
  if (this.scrollTop < 30 && currentChat && Date.now() - lastLoadTime > 500) {
    const first = this.querySelector('.msg');
    if (first && first.dataset.time) {
      loadMessages(currentChat, Number(first.dataset.time));
    }
  }
});

// Boot
(async () => {
  const ok = await checkAuth();
  if (ok) {
    authed = true;
    $('loginOverlay').style.display = 'none';
    init();
  } else {
    $('loginOverlay').style.display = 'flex';
  }
})();
</script>
